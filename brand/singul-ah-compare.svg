<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <!-- Gradientes compartilhados -->
    <linearGradient id="gSpark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="55%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="gOrbit" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
    <linearGradient id="gBrain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>

    <!-- Conceito 0 · Sparkle (original) -->
    <symbol id="mSpark" viewBox="-100 -100 200 200">
      <path d="M 0,-70 C 6,-22 22,-6 70,0 C 22,6 6,22 0,95 C -6,22 -22,6 -70,0 C -22,-6 -6,-22 0,-70 Z" fill="url(#gSpark)"/>
      <g fill="url(#gOrbit)">
        <path d="M 62,-55 C 63,-46 68,-41 77,-40 C 68,-39 63,-34 62,-25 C 61,-34 56,-39 47,-40 C 56,-41 61,-46 62,-55 Z"/>
        <path d="M 78, 42 C 79, 49 83, 53 90, 54 C 83, 55 79, 59 78, 66 C 77, 59 73, 55 66, 54 C 73, 53 77, 49 78, 42 Z"/>
        <path d="M -78,-15 C -77,-8 -73,-4 -66,-3 C -73,-2 -77, 2 -78, 9 C -79, 2 -83,-2 -90,-3 C -83,-4 -79,-8 -78,-15 Z"/>
      </g>
    </symbol>

    <!-- Conceito 1 · Constelação -->
    <symbol id="mConst" viewBox="-110 -110 220 220">
      <g stroke="#CBD5E1" stroke-width="2" stroke-linecap="round" fill="none">
        <line x1="-70" y1="60" x2="0"  y2="-10"/>
        <line x1="0"   y1="-10" x2="70" y2="60"/>
        <line x1="-45" y1="20" x2="45" y2="20"/>
        <line x1="0" y1="-10" x2="0" y2="-72"/>
        <line x1="-70" y1="60" x2="-85" y2="-45"/>
        <line x1="70" y1="60" x2="85" y2="-45"/>
      </g>
      <path transform="translate(0,-10) scale(0.55)"
        d="M 0,-70 C 6,-22 22,-6 70,0 C 22,6 6,22 0,70 C -6,22 -22,6 -70,0 C -22,-6 -6,-22 0,-70 Z" fill="url(#gSpark)"/>
      <g fill="url(#gOrbit)">
        <path transform="translate(0,-72) scale(0.22)" d="M 0,-70 C 6,-22 22,-6 70,0 C 22,6 6,22 0,70 C -6,22 -22,6 -70,0 C -22,-6 -6,-22 0,-70 Z"/>
        <path transform="translate(-70,60) scale(0.28)" d="M 0,-70 C 6,-22 22,-6 70,0 C 22,6 6,22 0,70 C -6,22 -22,6 -70,0 C -22,-6 -6,-22 0,-70 Z"/>
        <path transform="translate(70,60) scale(0.28)" d="M 0,-70 C 6,-22 22,-6 70,0 C 22,6 6,22 0,70 C -6,22 -22,6 -70,0 C -22,-6 -6,-22 0,-70 Z"/>
        <path transform="translate(-85,-45) scale(0.18)" d="M 0,-70 C 6,-22 22,-6 70,0 C 22,6 6,22 0,70 C -6,22 -22,6 -70,0 C -22,-6 -6,-22 0,-70 Z"/>
        <path transform="translate(85,-45) scale(0.18)" d="M 0,-70 C 6,-22 22,-6 70,0 C 22,6 6,22 0,70 C -6,22 -22,6 -70,0 C -22,-6 -6,-22 0,-70 Z"/>
        <circle cx="-45" cy="20" r="4"/>
        <circle cx="45" cy="20" r="4"/>
      </g>
    </symbol>

    <!-- Conceito 2 · Cérebro + Spark -->
    <symbol id="mBrain" viewBox="-110 -110 220 220">
      <path d="M -78,-8 C -82,-42 -54,-72 -22,-70 C -14,-86 14,-86 22,-70 C 54,-72 82,-42 78,-8 C 92,20 72,58 36,62 C 24,78 -24,78 -36,62 C -72,58 -92,20 -78,-8 Z" fill="url(#gBrain)"/>
      <path d="M 0,-70 C -4,-40 4,-10 0,20 C -4,40 4,58 0,72" stroke="#FFFFFF" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.9"/>
      <g stroke="#FFFFFF" stroke-width="2.4" fill="none" stroke-linecap="round" opacity="0.78">
        <path d="M -58,-40 C -42,-48 -26,-42 -20,-28"/>
        <path d="M -68,-14 C -50,-20 -32,-12 -22, 0"/>
        <path d="M -66, 16 C -48, 10 -30, 18 -22, 32"/>
        <path d="M -54, 44 C -38, 38 -22, 46 -14, 56"/>
      </g>
      <g stroke="#FFFFFF" stroke-width="2.2" fill="none" stroke-linecap="round" opacity="0.85">
        <polyline points="18,-40 34,-40 34,-22 54,-22"/>
        <polyline points="22,-8 40,-8 40, 12 60, 12"/>
        <polyline points="18, 30 36, 30 36, 48 56, 48"/>
      </g>
      <g fill="#FBBF24">
        <circle cx="54" cy="-22" r="3.2"/>
        <circle cx="60" cy=" 12" r="3.2"/>
        <circle cx="56" cy=" 48" r="3.2"/>
      </g>
      <g transform="translate(0,-86)">
        <path d="M 0,-22 C 2,-7 7,-2 22,0 C 7,2 2,7 0,26 C -2,7 -7,2 -22,0 C -7,-2 -2,-7 0,-22 Z" fill="url(#gOrbit)"/>
      </g>
    </symbol>
  </defs>

  <!-- Cabeçalho -->
  <text x="550" y="48" text-anchor="middle" font-size="24" font-weight="900" letter-spacing="-0.5" fill="#0F172A">
    Singul<tspan fill="#F97316">·</tspan>AH · comparação de conceitos
  </text>
  <text x="550" y="74" text-anchor="middle" font-size="12" font-weight="600" letter-spacing="3" fill="#94A3B8" style="text-transform:uppercase">
    Sparkle singular · Constelação · Cérebro + Spark
  </text>

  <!-- Colunas -->
  <g transform="translate(40,110)">
    <!-- ========== Col 0: Sparkle ========== -->
    <g transform="translate(0,0)">
      <text x="165" y="0" text-anchor="middle" font-size="11" font-weight="800" letter-spacing="3" fill="#64748B" style="text-transform:uppercase">0 · Sparkle singular</text>
      <rect x="0" y="20" width="330" height="220" rx="28" ry="28" fill="#F8FAFC" stroke="#E2E8F0"/>
      <use href="#mSpark" x="0" y="0" width="180" height="180" transform="translate(165,130)"/>
      <rect x="0" y="260" width="150" height="150" rx="32" ry="32" fill="#0F172A"/>
      <use href="#mSpark" x="0" y="0" width="110" height="110" transform="translate(75,335)"/>
      <rect x="180" y="260" width="150" height="150" rx="32" ry="32" fill="#F97316"/>
      <g transform="translate(255,335) scale(0.55)" fill="#FFFFFF">
        <path d="M 0,-70 C 6,-22 22,-6 70,0 C 22,6 6,22 0,95 C -6,22 -22,6 -70,0 C -22,-6 -6,-22 0,-70 Z"/>
        <path d="M 62,-55 C 63,-46 68,-41 77,-40 C 68,-39 63,-34 62,-25 C 61,-34 56,-39 47,-40 C 56,-41 61,-46 62,-55 Z"/>
        <path d="M 78, 42 C 79,49 83,53 90,54 C 83,55 79,59 78,66 C 77,59 73,55 66,54 C 73,53 77,49 78,42 Z"/>
        <path d="M -78,-15 C -77,-8 -73,-4 -66,-3 C -73,-2 -77,2 -78,9 C -79,2 -83,-2 -90,-3 C -83,-4 -79,-8 -78,-15 Z"/>
      </g>
      <text x="165" y="450" text-anchor="middle" font-size="10" font-weight="600" fill="#64748B">
        Singularidade + multi-informante
      </text>
      <text x="165" y="466" text-anchor="middle" font-size="9" fill="#94A3B8">moderno · identidade IA · leve</text>
    </g>

    <!-- ========== Col 1: Constelação ========== -->
    <g transform="translate(345,0)">
      <text x="165" y="0" text-anchor="middle" font-size="11" font-weight="800" letter-spacing="3" fill="#64748B" style="text-transform:uppercase">1 · Constelação</text>
      <rect x="0" y="20" width="330" height="220" rx="28" ry="28" fill="#F8FAFC" stroke="#E2E8F0"/>
      <use href="#mConst" x="0" y="0" width="200" height="200" transform="translate(165,130)"/>
      <rect x="0" y="260" width="150" height="150" rx="32" ry="32" fill="#0F172A"/>
      <use href="#mConst" x="0" y="0" width="130" height="130" transform="translate(75,335)"/>
      <rect x="180" y="260" width="150" height="150" rx="32" ry="32" fill="#F97316"/>
      <g transform="translate(255,335)">
        <g stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.9">
          <line x1="-42" y1="36" x2="0"   y2="-6"/>
          <line x1="0"   y1="-6" x2="42"  y2="36"/>
          <line x1="-28" y1="12" x2="28"  y2="12"/>
          <line x1="0"   y1="-6" x2="0"   y2="-44"/>
          <line x1="-42" y1="36" x2="-50" y2="-28"/>
          <line x1="42"  y1="36" x2="50"  y2="-28"/>
        </g>
        <g fill="#FFFFFF">
          <path transform="translate(0,-6) scale(0.34)" d="M 0,-70 C 6,-22 22,-6 70,0 C 22,6 6,22 0,70 C -6,22 -22,6 -70,0 C -22,-6 -6,-22 0,-70 Z"/>
          <circle cx="0" cy="-44" r="4"/>
          <circle cx="-42" cy="36" r="5"/>
          <circle cx="42" cy="36" r="5"/>
          <circle cx="-50" cy="-28" r="3"/>
          <circle cx="50" cy="-28" r="3"/>
          <circle cx="-28" cy="12" r="2.5"/>
          <circle cx="28" cy="12" r="2.5"/>
        </g>
      </g>
      <text x="165" y="450" text-anchor="middle" font-size="10" font-weight="600" fill="#64748B">
        Rede · cada aluno uma estrela
      </text>
      <text x="165" y="466" text-anchor="middle" font-size="9" fill="#94A3B8">poético · silhueta sutil de "A"</text>
    </g>

    <!-- ========== Col 2: Cérebro ========== -->
    <g transform="translate(690,0)">
      <text x="165" y="0" text-anchor="middle" font-size="11" font-weight="800" letter-spacing="3" fill="#64748B" style="text-transform:uppercase">2 · Cérebro + Spark</text>
      <rect x="0" y="20" width="330" height="220" rx="28" ry="28" fill="#F8FAFC" stroke="#E2E8F0"/>
      <use href="#mBrain" x="0" y="0" width="200" height="200" transform="translate(165,130)"/>
      <rect x="0" y="260" width="150" height="150" rx="32" ry="32" fill="#0F172A"/>
      <use href="#mBrain" x="0" y="0" width="130" height="130" transform="translate(75,335)"/>
      <rect x="180" y="260" width="150" height="150" rx="32" ry="32" fill="#F97316"/>
      <g transform="translate(255,335) scale(0.6)">
        <path d="M -78,-8 C -82,-42 -54,-72 -22,-70 C -14,-86 14,-86 22,-70 C 54,-72 82,-42 78,-8 C 92,20 72,58 36,62 C 24,78 -24,78 -36,62 C -72,58 -92,20 -78,-8 Z" fill="#FFFFFF"/>
        <path d="M 0,-70 C -4,-40 4,-10 0,20 C -4,40 4,58 0,72" stroke="#F97316" stroke-width="4" fill="none" stroke-linecap="round"/>
        <g stroke="#F97316" stroke-width="2.4" fill="none" stroke-linecap="round">
          <path d="M -58,-40 C -42,-48 -26,-42 -20,-28"/>
          <path d="M -68,-14 C -50,-20 -32,-12 -22, 0"/>
          <polyline points="22,-8 40,-8 40, 12 60, 12"/>
        </g>
        <circle cx="60" cy="12" r="3.2" fill="#F97316"/>
        <g transform="translate(0,-86)">
          <path d="M 0,-22 C 2,-7 7,-2 22,0 C 7,2 2,7 0,26 C -2,7 -7,2 -22,0 C -7,-2 -2,-7 0,-22 Z" fill="#F97316"/>
        </g>
      </g>
      <text x="165" y="450" text-anchor="middle" font-size="10" font-weight="600" fill="#64748B">
        Cognição · pedagogia + IA
      </text>
      <text x="165" y="466" text-anchor="middle" font-size="9" fill="#94A3B8">explícito · acadêmico · narrativo</text>
    </g>
  </g>

  <!-- Rodapé comparativo -->
  <g transform="translate(40,620)" font-size="11" fill="#475569">
    <text x="0" y="0" font-weight="800" letter-spacing="2" fill="#0F172A" style="text-transform:uppercase">Quando usar cada um</text>
    <text x="0" y="22"><tspan font-weight="800" fill="#F97316">0 · Sparkle:</tspan> quando a identidade do produto precisa ser moderna, tech e reconhecível em ícone pequeno (app, favicon).</text>
    <text x="0" y="42"><tspan font-weight="800" fill="#F97316">1 · Constelação:</tspan> quando o público-alvo é pedagógico/humanista e você quer enfatizar rede, singularidade e multi-informante.</text>
    <text x="0" y="62"><tspan font-weight="800" fill="#F97316">2 · Cérebro + Spark:</tspan> quando a apresentação é acadêmica e precisa comunicar explicitamente "cognição + IA pedagógica".</text>
  </g>
</svg>
