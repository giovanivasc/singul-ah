<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="bBrainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="bSparkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>

    <!-- ================= ÍCONE: Cérebro + Sparkle ================= -->
    <!--
      Metáfora: hemisfério esquerdo = estrutura/dobras (dimensão cognitiva-pedagógica);
      hemisfério direito = linhas "circuito/IA" terminando em nós (dimensão tecnológica);
      no centro alto, sparkle dourado = brilho singular / insight / AH.
    -->
    <symbol id="brainMark" viewBox="-110 -110 220 220">
      <!-- Contorno do cérebro (silhueta estilizada, visto de cima/frente) -->
      <path d="
        M -78,-8
        C -82,-42 -54,-72 -22,-70
        C -14,-86   14,-86   22,-70
        C 54,-72 82,-42 78,-8
        C 92, 20  72, 58  36, 62
        C 24, 78  -24, 78 -36, 62
        C -72, 58 -92, 20 -78,-8 Z"
        fill="url(#bBrainGrad)"/>

      <!-- Fissura central -->
      <path d="M 0,-70 C -4,-40 4,-10 0,20 C -4,40 4,58 0,72"
        stroke="#FFFFFF" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.9"/>

      <!-- Hemisfério esquerdo: dobras (cognitivo/pedagógico) -->
      <g stroke="#FFFFFF" stroke-width="2.4" fill="none" stroke-linecap="round" opacity="0.78">
        <path d="M -58,-40 C -42,-48 -26,-42 -20,-28"/>
        <path d="M -68,-14 C -50,-20 -32,-12 -22, 0"/>
        <path d="M -66, 16 C -48, 10 -30, 18 -22, 32"/>
        <path d="M -54, 44 C -38, 38 -22, 46 -14, 56"/>
      </g>

      <!-- Hemisfério direito: circuito IA (linhas retas + nós) -->
      <g stroke="#FFFFFF" stroke-width="2.2" fill="none" stroke-linecap="round" opacity="0.85">
        <polyline points="18,-40 34,-40 34,-22 54,-22"/>
        <polyline points="22,-8 40,-8 40, 12 60, 12"/>
        <polyline points="18, 30 36, 30 36, 48 56, 48"/>
        <polyline points="28, 62 44, 62"/>
      </g>
      <g fill="#FBBF24">
        <circle cx="54" cy="-22" r="3.2"/>
        <circle cx="60" cy=" 12" r="3.2"/>
        <circle cx="56" cy=" 48" r="3.2"/>
        <circle cx="44" cy=" 62" r="3.2"/>
      </g>

      <!-- Sparkle central — brilho da Alta Habilidade / insight -->
      <g transform="translate(0,-86)">
        <path d="M 0,-22 C 2,-7 7,-2 22,0 C 7,2 2,7 0,26 C -2,7 -7,2 -22,0 C -7,-2 -2,-7 0,-22 Z"
          fill="url(#bSparkGrad)"/>
      </g>

      <!-- Mini-sparks orbitando (perspectivas multi-informante) -->
      <g fill="#FBBF24">
        <path transform="translate(-80,-58) scale(0.18)"
          d="M 0,-70 C 6,-22 22,-6 70,0 C 22,6 6,22 0,70 C -6,22 -22,6 -70,0 C -22,-6 -6,-22 0,-70 Z"/>
        <path transform="translate(82,-56) scale(0.16)"
          d="M 0,-70 C 6,-22 22,-6 70,0 C 22,6 6,22 0,70 C -6,22 -22,6 -70,0 C -22,-6 -6,-22 0,-70 Z"/>
      </g>
    </symbol>
  </defs>

  <!-- Título -->
  <text x="40" y="40" font-size="11" font-weight="700" letter-spacing="3" fill="#94A3B8" style="text-transform:uppercase">
    Conceito 2 · Cérebro + Spark — hemisfério pedagógico (dobras) · hemisfério tecnológico (circuito IA) · faísca de AH
  </text>

  <!-- A · Horizontal -->
  <g transform="translate(40,70)">
    <use href="#brainMark" x="0" y="0" width="170" height="170" transform="translate(85,85)"/>
    <g transform="translate(210,0)">
      <text x="0" y="100" font-size="72" font-weight="900" letter-spacing="-2" fill="#0F172A">
        Singul<tspan fill="#F97316">·</tspan>AH
      </text>
      <text x="2" y="136" font-size="18" font-weight="700" letter-spacing="4" fill="#64748B" style="text-transform:uppercase">
        Inteligência pedagógica · Altas Habilidades
      </text>
    </g>
  </g>

  <!-- Variantes -->
  <g transform="translate(40,280)">
    <!-- Empilhada -->
    <g>
      <use href="#brainMark" x="0" y="0" width="140" height="140" transform="translate(70,70)"/>
      <text x="70" y="222" text-anchor="middle" font-size="32" font-weight="900" letter-spacing="-1" fill="#0F172A">
        Singul<tspan fill="#F97316">·</tspan>AH
      </text>
    </g>
    <!-- Ícone app -->
    <g transform="translate(250,0)">
      <rect x="0" y="0" width="200" height="200" rx="44" ry="44" fill="#0F172A"/>
      <use href="#brainMark" x="0" y="0" width="170" height="170" transform="translate(100,100)"/>
    </g>
    <!-- Monocromática -->
    <g transform="translate(490,0)">
      <rect x="0" y="0" width="200" height="200" rx="44" ry="44" fill="#F97316"/>
      <g transform="translate(100,100) scale(0.78)">
        <path d="
          M -78,-8
          C -82,-42 -54,-72 -22,-70
          C -14,-86   14,-86   22,-70
          C 54,-72 82,-42 78,-8
          C 92, 20  72, 58  36, 62
          C 24, 78  -24, 78 -36, 62
          C -72, 58 -92, 20 -78,-8 Z"
          fill="#FFFFFF"/>
        <path d="M 0,-70 C -4,-40 4,-10 0,20 C -4,40 4,58 0,72"
          stroke="#F97316" stroke-width="4" fill="none" stroke-linecap="round"/>
        <g stroke="#F97316" stroke-width="2.4" fill="none" stroke-linecap="round">
          <path d="M -58,-40 C -42,-48 -26,-42 -20,-28"/>
          <path d="M -68,-14 C -50,-20 -32,-12 -22, 0"/>
          <path d="M -66, 16 C -48, 10 -30, 18 -22, 32"/>
          <polyline points="22,-8 40,-8 40, 12 60, 12"/>
          <polyline points="18, 30 36, 30 36, 48 56, 48"/>
        </g>
        <g fill="#F97316">
          <circle cx="60" cy=" 12" r="3.2"/>
          <circle cx="56" cy=" 48" r="3.2"/>
        </g>
        <g transform="translate(0,-86)">
          <path d="M 0,-22 C 2,-7 7,-2 22,0 C 7,2 2,7 0,26 C -2,7 -7,2 -22,0 C -7,-2 -2,-7 0,-22 Z" fill="#F97316"/>
        </g>
      </g>
    </g>
  </g>

  <!-- Legendas -->
  <g font-size="10" font-weight="700" letter-spacing="2" fill="#94A3B8" style="text-transform:uppercase">
    <text x="40" y="510">Empilhada</text>
    <text x="290" y="510">Ícone App</text>
    <text x="530" y="510">Monocromática</text>
  </g>
</svg>
