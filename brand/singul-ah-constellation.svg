<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="cStarLarge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#FBBF24"/>
      <stop offset="55%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="cStarSmall" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>

    <!-- ================= ÍCONE: Constelação ================= -->
    <!--
      Metáfora: cada aluno é uma estrela única. As linhas = rede (escola, família, AEE)
      conectando perspectivas em torno do estudante focal (estrela central maior).
      A constelação desenha discretamente a silhueta de um "A" estilizado (de AH).
    -->
    <symbol id="constellationMark" viewBox="-110 -110 220 220">
      <!-- Linhas conectando a rede -->
      <g stroke="#CBD5E1" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.85">
        <line x1="-70" y1="60"  x2="0"   y2="-10"/>  <!-- base-esq → centro -->
        <line x1="0"   y1="-10" x2="70"  y2="60"/>   <!-- centro → base-dir -->
        <line x1="-45" y1="20"  x2="45"  y2="20"/>   <!-- travessão do "A" -->
        <line x1="0"   y1="-10" x2="0"   y2="-72"/>  <!-- centro → topo -->
        <line x1="-70" y1="60"  x2="-85" y2="-45"/>  <!-- base-esq → esq-alto -->
        <line x1="70"  y1="60"  x2="85"  y2="-45"/>  <!-- base-dir → dir-alto -->
      </g>

      <!-- Estrela focal (estudante) — maior, sparkle 4-pontas -->
      <path transform="translate(0,-10) scale(0.55)"
        d="M 0,-70 C 6,-22 22,-6 70,0 C 22,6 6,22 0,70 C -6,22 -22,6 -70,0 C -22,-6 -6,-22 0,-70 Z"
        fill="url(#cStarLarge)"/>

      <!-- Estrelas secundárias (perspectivas/rede) -->
      <g fill="url(#cStarSmall)">
        <!-- Topo -->
        <path transform="translate(0,-72) scale(0.22)"
          d="M 0,-70 C 6,-22 22,-6 70,0 C 22,6 6,22 0,70 C -6,22 -22,6 -70,0 C -22,-6 -6,-22 0,-70 Z"/>
        <!-- Base esquerda -->
        <path transform="translate(-70,60) scale(0.28)"
          d="M 0,-70 C 6,-22 22,-6 70,0 C 22,6 6,22 0,70 C -6,22 -22,6 -70,0 C -22,-6 -6,-22 0,-70 Z"/>
        <!-- Base direita -->
        <path transform="translate(70,60) scale(0.28)"
          d="M 0,-70 C 6,-22 22,-6 70,0 C 22,6 6,22 0,70 C -6,22 -22,6 -70,0 C -22,-6 -6,-22 0,-70 Z"/>
        <!-- Laterais altas (perspectivas complementares) -->
        <path transform="translate(-85,-45) scale(0.18)"
          d="M 0,-70 C 6,-22 22,-6 70,0 C 22,6 6,22 0,70 C -6,22 -22,6 -70,0 C -22,-6 -6,-22 0,-70 Z"/>
        <path transform="translate(85,-45) scale(0.18)"
          d="M 0,-70 C 6,-22 22,-6 70,0 C 22,6 6,22 0,70 C -6,22 -22,6 -70,0 C -22,-6 -6,-22 0,-70 Z"/>
        <!-- Travessão (pontos no meio da linha horizontal do "A") -->
        <circle cx="-45" cy="20" r="4"/>
        <circle cx="45"  cy="20" r="4"/>
      </g>
    </symbol>
  </defs>

  <!-- Título -->
  <text x="40" y="40" font-size="11" font-weight="700" letter-spacing="3" fill="#94A3B8" style="text-transform:uppercase">
    Conceito 1 · Constelação — cada aluno é uma estrela única; a rede (família · escola · AEE) converge sobre ele
  </text>

  <!-- A · Horizontal -->
  <g transform="translate(40,70)">
    <use href="#constellationMark" x="0" y="0" width="160" height="160" transform="translate(80,80)"/>
    <g transform="translate(200,0)">
      <text x="0" y="90" font-size="72" font-weight="900" letter-spacing="-2" fill="#0F172A">
        Singul<tspan fill="#F97316">·</tspan>AH
      </text>
      <text x="2" y="126" font-size="18" font-weight="700" letter-spacing="4" fill="#64748B" style="text-transform:uppercase">
        Plano Individualizado · Altas Habilidades
      </text>
    </g>
  </g>

  <!-- Variantes lado a lado -->
  <g transform="translate(40,270)">
    <!-- Empilhada -->
    <g>
      <use href="#constellationMark" x="0" y="0" width="130" height="130" transform="translate(65,65)"/>
      <text x="65" y="215" text-anchor="middle" font-size="32" font-weight="900" letter-spacing="-1" fill="#0F172A">
        Singul<tspan fill="#F97316">·</tspan>AH
      </text>
    </g>
    <!-- Ícone app -->
    <g transform="translate(250,0)">
      <rect x="0" y="0" width="200" height="200" rx="44" ry="44" fill="#0F172A"/>
      <use href="#constellationMark" x="0" y="0" width="170" height="170" transform="translate(100,100)"/>
    </g>
    <!-- Monocromática -->
    <g transform="translate(490,0)">
      <rect x="0" y="0" width="200" height="200" rx="44" ry="44" fill="#F97316"/>
      <g transform="translate(100,100)">
        <g stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.9">
          <line x1="-54" y1="46" x2="0"   y2="-8"/>
          <line x1="0"   y1="-8" x2="54"  y2="46"/>
          <line x1="-35" y1="15" x2="35"  y2="15"/>
          <line x1="0"   y1="-8" x2="0"   y2="-56"/>
          <line x1="-54" y1="46" x2="-65" y2="-35"/>
          <line x1="54"  y1="46" x2="65"  y2="-35"/>
        </g>
        <g fill="#FFFFFF">
          <path transform="translate(0,-8) scale(0.42)"
            d="M 0,-70 C 6,-22 22,-6 70,0 C 22,6 6,22 0,70 C -6,22 -22,6 -70,0 C -22,-6 -6,-22 0,-70 Z"/>
          <circle cx="0"   cy="-56" r="5"/>
          <circle cx="-54" cy="46"  r="6"/>
          <circle cx="54"  cy="46"  r="6"/>
          <circle cx="-65" cy="-35" r="4"/>
          <circle cx="65"  cy="-35" r="4"/>
          <circle cx="-35" cy="15"  r="3"/>
          <circle cx="35"  cy="15"  r="3"/>
        </g>
      </g>
    </g>
  </g>

  <!-- Legendas -->
  <g font-size="10" font-weight="700" letter-spacing="2" fill="#94A3B8" style="text-transform:uppercase">
    <text x="40" y="250">Horizontal</text>
    <text x="65" y="250" text-anchor="middle"></text>
    <text x="40" y="500">Empilhada</text>
    <text x="290" y="500">Ícone App</text>
    <text x="530" y="500">Monocromática</text>
  </g>
</svg>
